<!-- @dsCard group="Portfolio" viewport="1280x860" name="Bervinov — single-page портфолио" subtitle="Полная страница-портфолио на компонентах системы" -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Бервинов Мирон · Портфолио</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { margin: 0; background: var(--surface-page); color: var(--text-secondary);
         font-family: var(--font-body); -webkit-font-smoothing: antialiased; overflow-x: hidden; }
  a { color: inherit; text-decoration: none; }
  ::selection { background: rgba(112,220,211,0.25); }

  /* ---- keyframes ---- */
  @keyframes bvline { 0%,100% { transform: scaleX(0.4); opacity: .4; } 50% { transform: scaleX(1); opacity: 1; } }
  @keyframes bvfloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
  @keyframes bvglow { 0%,100% { opacity: .45; transform: scale(1); } 50% { opacity: .85; transform: scale(1.04); } }
  @keyframes bvorb { 0%,100% { transform: translate(0,0) scale(1); } 33% { transform: translate(18px,-22px) scale(1.06); } 66% { transform: translate(-14px,12px) scale(.96); } }
  @keyframes bvmesh { 0%,100% { opacity: .55; transform: scale(1) rotate(0deg); } 50% { opacity: .75; transform: scale(1.08) rotate(2deg); } }
  @keyframes bvshimmer { 0% { background-position: 200% center; } 100% { background-position: -200% center; } }
  @keyframes bvshine { 0% { transform: translateX(-120%) skewX(-18deg); } 100% { transform: translateX(220%) skewX(-18deg); } }
  @keyframes bvpop { 0% { opacity: 0; transform: scale(.6); } 60% { transform: scale(1.08); } 100% { opacity: 1; transform: scale(1); } }
  @keyframes bvpulse-ring { 0%,100% { box-shadow: 0 0 0 0 rgba(112,220,211,.35), var(--glow-mint-soft); } 50% { box-shadow: 0 0 0 12px rgba(112,220,211,0), var(--glow-mint-strong); } }

  /* ---- ambient ---- */
  .bv-root { position: relative; isolation: isolate; }
  .bv-ambient { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
  .bv-ambient__grid {
    position: absolute; inset: 0;
    background-image: linear-gradient(rgba(112,220,211,.04) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(112,220,211,.04) 1px, transparent 1px);
    background-size: 64px 64px;
    mask-image: radial-gradient(ellipse 80% 60% at 50% 20%, #000 20%, transparent 70%);
  }
  .bv-ambient__mesh {
    position: absolute; top: -20%; left: -10%; width: 70%; height: 60%;
    background: radial-gradient(ellipse, rgba(112,220,211,.12) 0%, transparent 65%);
    animation: bvmesh 14s ease-in-out infinite;
  }
  .bv-cursor-glow {
    position: fixed; top: 0; left: 0; width: 420px; height: 420px; margin: -210px 0 0 -210px;
    background: radial-gradient(circle, rgba(112,220,211,.09) 0%, transparent 65%);
    pointer-events: none; z-index: 1; transition: opacity .4s; opacity: .7;
  }
  .bv-root > header, .bv-root > main, .bv-root > footer { position: relative; z-index: 2; }

  .bv-eyebrow { font-size: 12px; font-weight: 500; letter-spacing: 0.094em; text-transform: uppercase;
                color: var(--color-ice-blue); }
  .bv-eyebrow--line { display: flex; align-items: center; gap: 14px; }
  .bv-eyebrow--line::before {
    content: ''; width: 32px; height: 1px; flex-shrink: 0;
    background: linear-gradient(90deg, var(--color-phosphor-mint), transparent);
    transform-origin: left; transform: scaleX(0); transition: transform .8s var(--ease-out) .1s;
  }
  .is-in .bv-eyebrow--line::before, [data-reveal-stagger].is-in > .bv-eyebrow--line::before { transform: scaleX(1); }

  .bv-h2 { font-family: var(--font-display); font-weight: 300; letter-spacing: 0.04em; color: #fff;
           font-size: clamp(26px, 3vw, 40px); line-height: 1.18; margin: 16px 0 0; max-width: 18ch; }
  .bv-about__lead .bv-h2 { font-size: clamp(24px, 3.2vw, 40px); max-width: 22ch; text-wrap: balance; }
  .bv-h2--lg { max-width: none; }
  .bv-section { max-width: var(--page-max-width); margin: 0 auto; padding: clamp(64px, 9vw, 120px) 32px 0; }
  .bv-section__head { margin-bottom: 40px; }

  /* reveal + stagger */
  [data-reveal] { opacity: 0; transform: translateY(32px); transition: opacity .85s var(--ease-out), transform .85s var(--ease-out); }
  [data-reveal].is-in { opacity: 1; transform: none; }
  [data-reveal-stagger] > * { opacity: 0; transform: translateY(26px); transition: opacity .7s var(--ease-out), transform .7s var(--ease-out); }
  [data-reveal-stagger].is-in > *:nth-child(1) { opacity: 1; transform: none; transition-delay: 0ms; }
  [data-reveal-stagger].is-in > *:nth-child(2) { opacity: 1; transform: none; transition-delay: 90ms; }
  [data-reveal-stagger].is-in > *:nth-child(3) { opacity: 1; transform: none; transition-delay: 180ms; }
  [data-reveal-stagger].is-in > *:nth-child(4) { opacity: 1; transform: none; transition-delay: 270ms; }
  [data-reveal-stagger].is-in > *:nth-child(5) { opacity: 1; transform: none; transition-delay: 360ms; }
  [data-reveal-stagger].is-in > *:nth-child(6) { opacity: 1; transform: none; transition-delay: 450ms; }
  [data-reveal-stagger].is-in > *:nth-child(n+7) { opacity: 1; transform: none; transition-delay: 540ms; }

  /* ---- NAV ---- */
  .bv-nav {
    position: sticky; top: 0; z-index: 50; display: flex; align-items: center; justify-content: space-between;
    height: 68px; padding: 0 32px;
    background: rgba(7,7,7,0.55); backdrop-filter: blur(18px) saturate(1.2);
    border-bottom: 1px solid transparent;
    transition: height .35s var(--ease-out), background .35s var(--ease-out), border-color .35s var(--ease-out), box-shadow .35s;
  }
  .bv-nav.is-scrolled {
    height: 58px; background: rgba(7,7,7,0.88);
    border-bottom-color: var(--border-hairline);
    box-shadow: 0 8px 32px rgba(0,0,0,.35);
  }
  .bv-logo__mark {
    font-family: var(--font-display); font-weight: 600; font-size: 18px; letter-spacing: 0.08em;
    color: #fff; border: 1px solid var(--color-phosphor-mint); border-radius: 10px; padding: 6px 10px;
    box-shadow: var(--glow-mint-soft); display: inline-block;
    transition: box-shadow var(--dur-base) var(--ease-out), transform var(--dur-base) var(--ease-out);
  }
  .bv-logo:hover .bv-logo__mark { box-shadow: var(--glow-mint-strong); transform: translateY(-1px); }
  .bv-nav__links { display: flex; gap: 28px; }
  .bv-nav__links a {
    position: relative; font-size: 14px; color: var(--color-slate-mute);
    transition: color var(--dur-fast) var(--ease-out);
  }
  .bv-nav__links a::after {
    content: ''; position: absolute; left: 0; bottom: -6px; width: 100%; height: 1px;
    background: var(--color-phosphor-mint); transform: scaleX(0); transform-origin: left;
    transition: transform .35s var(--ease-out); box-shadow: 0 0 8px rgba(112,220,211,.5);
  }
  .bv-nav__links a:hover, .bv-nav__links a.is-active { color: #fff; }
  .bv-nav__links a.is-active::after, .bv-nav__links a:hover::after { transform: scaleX(1); }

  /* ---- HERO ---- */
  .bv-hero {
    position: relative; max-width: 1320px; margin: 0 auto; min-height: 88vh;
    display: grid; grid-template-columns: 1.1fr 0.9fr; align-items: center; gap: 24px;
    padding: 40px 32px 80px; overflow: hidden;
  }
  .bv-hero__orbs { position: absolute; inset: 0; pointer-events: none; z-index: 0; }
  .bv-orb {
    position: absolute; border-radius: 50%; filter: blur(60px); opacity: .5;
    animation: bvorb 12s ease-in-out infinite;
  }
  .bv-orb--1 { width: 340px; height: 340px; top: 8%; right: 12%; background: rgba(112,220,211,.14); }
  .bv-orb--2 { width: 220px; height: 220px; bottom: 18%; left: 6%; background: rgba(0,146,228,.1); animation-delay: -4s; }
  .bv-orb--3 { width: 180px; height: 180px; top: 42%; left: 38%; background: rgba(112,220,211,.08); animation-delay: -7s; }
  .bv-hero__ghost {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-46%);
    font-family: var(--font-display); font-weight: 300; letter-spacing: 0.14em;
    font-size: clamp(96px, 19vw, 320px); color: rgba(112,220,211,0.06); white-space: nowrap;
    pointer-events: none; user-select: none; text-shadow: 0 0 60px rgba(112,220,211,0.12); z-index: 0;
    will-change: transform;
  }
  .bv-hero__photo-wrap {
    position: relative; z-index: 2; justify-self: end; width: 100%; max-width: 460px;
    animation: bvfloat 5.5s ease-in-out infinite;
  }
  .bv-hero__photo-glow {
    position: absolute; inset: -8%; border-radius: var(--radius-card-lg);
    background: radial-gradient(ellipse at 50% 80%, rgba(112,220,211,.25), transparent 65%);
    animation: bvglow 4s ease-in-out infinite; z-index: 0;
  }
  .bv-hero__photo {
    position: relative; z-index: 1; width: 100%; height: auto; display: block;
    border-radius: var(--radius-card-lg); border: 1px solid rgba(112,220,211,.25);
    box-shadow: 0 24px 64px rgba(0,0,0,.5), var(--glow-mint-soft);
    filter: saturate(.95) contrast(1.05);
    transition: transform .5s var(--ease-out), box-shadow .5s var(--ease-out);
  }
  .bv-hero__photo-wrap:hover .bv-hero__photo {
    transform: scale(1.02) translateY(-4px);
    box-shadow: 0 32px 80px rgba(0,0,0,.55), var(--glow-mint-strong);
  }
  .bv-hero__copy { position: relative; z-index: 3; }
  .bv-hero__name {
    font-family: var(--font-display); font-weight: 300; letter-spacing: 0.05em; color: #fff;
    font-size: clamp(48px, 8vw, 104px); line-height: 0.98; margin: 18px 0 0;
    display: flex; flex-direction: column;
  }
  .bv-hero__name-line { display: block; }
  .bv-hero__name-line--accent {
    background: linear-gradient(105deg, #fff 30%, var(--color-phosphor-mint) 50%, #fff 70%);
    background-size: 200% auto; -webkit-background-clip: text; background-clip: text; color: transparent;
    animation: bvshimmer 6s linear infinite;
  }
  .bv-hero__sub { font-size: clamp(15px, 1.4vw, 19px); color: var(--text-secondary); max-width: 34ch; margin: 22px 0 0; }
  .bv-hero__actions { display: flex; gap: 14px; margin-top: 34px; flex-wrap: wrap; }
  .bv-scroll {
    position: absolute; bottom: 26px; left: 32px; z-index: 3; display: flex; align-items: center; gap: 12px;
    font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted);
    transition: color var(--dur-fast);
  }
  .bv-scroll:hover { color: var(--color-phosphor-mint); }
  .bv-scroll__line {
    width: 60px; height: 1px;
    background: linear-gradient(90deg, var(--color-phosphor-mint), transparent);
    animation: bvline 2.2s var(--ease-out) infinite; transform-origin: left;
  }

  /* ---- ABOUT ---- */
  .bv-about { display: grid; grid-template-columns: 1.4fr 1fr; gap: 40px; align-items: center; }
  .bv-tags { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 26px; }
  .bv-tags > * { transition: transform .3s var(--ease-out), box-shadow .3s; }
  .bv-tags > *:hover { transform: translateY(-3px); box-shadow: var(--glow-mint-soft); }
  .bv-about__stats {
    display: flex; justify-content: space-between; gap: 24px; flex-wrap: wrap;
    transition: transform .5s var(--ease-out), box-shadow .5s;
  }
  .bv-about__stats:hover { transform: translateY(-4px); box-shadow: var(--glow-mint-soft); }

  /* ---- WORKS bento ---- */
  .bv-bento { display: grid; grid-template-columns: repeat(3, 1fr); grid-auto-rows: 300px; gap: 20px; }
  .bv-work {
    padding: 0 !important; overflow: hidden; display: flex; flex-direction: column;
    transition: transform .45s var(--ease-out), box-shadow .45s var(--ease-out), border-color .45s;
  }
  .bv-work:hover { transform: translateY(-6px); box-shadow: 0 20px 48px rgba(0,0,0,.4); }
  .bv-work--flagship { grid-column: span 2; grid-row: span 2; }
  .bv-work--wide { grid-column: span 2; }
  .bv-work--tall { grid-row: span 2; }
  .bv-work--featured { animation: bvpulse-ring 4s ease-in-out infinite; }
  .bv-work__link { display: block; color: inherit; }
  .bv-work__head h3 a { color: inherit; transition: color .3s; }
  .bv-work__head h3 a:hover { color: var(--color-phosphor-mint); }
  .bv-work__open {
    font-size: 13px; font-weight: 600; letter-spacing: .04em; color: var(--color-phosphor-mint);
    margin-top: 4px; opacity: 0; transform: translateY(6px); transition: opacity .35s, transform .35s;
  }
  .bv-work:hover .bv-work__open { opacity: 1; transform: none; }
  .bv-work__media { position: relative; overflow: hidden; flex: 1; min-height: 120px; }
  .bv-work__media img {
    width: 100%; height: 100%; object-fit: cover; display: block;
    transition: transform .65s var(--ease-out), filter .65s;
  }
  .bv-work:hover .bv-work__media img { transform: scale(1.08); filter: brightness(1.05); }
  .bv-work__shine {
    position: absolute; inset: 0; z-index: 2; pointer-events: none;
    background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,.12) 50%, transparent 60%);
    transform: translateX(-120%) skewX(-18deg);
  }
  .bv-work:hover .bv-work__shine { animation: bvshine .75s var(--ease-out); }
  .bv-work__overlay {
    position: absolute; inset: 0; z-index: 3; padding: 20px; display: flex; flex-direction: column; justify-content: flex-end;
    gap: 8px; background: linear-gradient(0deg, rgba(7,7,7,0.92) 10%, rgba(7,7,7,0.2) 60%, transparent);
    opacity: 0; transition: opacity var(--dur-base) var(--ease-out);
  }
  .bv-work:hover .bv-work__overlay { opacity: 1; }
  .bv-work__overlay p { margin: 0; font-size: 14px; color: var(--text-secondary); line-height: 1.5;
                        transform: translateY(8px); transition: transform .4s var(--ease-out); }
  .bv-work:hover .bv-work__overlay p { transform: none; }
  .bv-work__badge { position: absolute; top: 16px; left: 16px; z-index: 4; }
  .bv-work__price { font-family: var(--font-display); font-weight: 400; letter-spacing: 0.02em;
                    color: var(--color-phosphor-mint); font-size: 18px; text-shadow: 0 0 18px rgba(112,220,211,0.4); }
  .bv-work__body { padding: 20px; display: flex; flex-direction: column; gap: 10px; }
  .bv-work__head { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; }
  .bv-work__head h3 { font-family: var(--font-display); font-weight: 300; letter-spacing: 0.04em; color: #fff;
                      font-size: 22px; margin: 0; transition: color .3s; }
  .bv-work:hover .bv-work__head h3 { color: var(--color-phosphor-mint); }
  .bv-work--flagship .bv-work__head h3 { color: var(--color-phosphor-mint); font-size: 28px; }
  .bv-work__cat { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); white-space: nowrap; }
  .bv-work__desc { margin: 0; font-size: 14px; color: var(--text-tertiary); line-height: 1.5; }
  .bv-work__foot { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-top: auto; padding-top: 6px; }
  .bv-tiers { display: flex; flex-direction: column; gap: 8px; margin: 4px 0; }
  .bv-tier {
    display: flex; align-items: center; justify-content: space-between; padding: 10px 14px;
    background: var(--surface-raised); border: 1px solid var(--border-hairline); border-radius: 12px;
    font-size: 14px; color: var(--text-secondary);
    transition: border-color .3s, transform .3s, background .3s;
  }
  .bv-tier:hover { border-color: rgba(112,220,211,.35); transform: translateX(4px); background: var(--tint-mint-08); }
  .bv-tier__price { font-family: var(--font-display); color: var(--color-phosphor-mint); letter-spacing: 0.02em; }

  /* ---- PRICING ---- */
  .bv-prices { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; align-items: stretch; }
  .bv-prices > * { transition: transform .45s var(--ease-out), box-shadow .45s; }
  .bv-prices > *:hover { transform: translateY(-8px); box-shadow: 0 16px 40px rgba(0,0,0,.35); }

  /* ---- REVIEWS ---- */
  .bv-reviews { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
  .bv-reviews > * { transition: transform .4s var(--ease-out), box-shadow .4s; }
  .bv-reviews > *:hover { transform: translateY(-5px); box-shadow: var(--glow-mint-soft); }

  /* ---- CONTACTS ---- */
  .bv-contacts { display: grid; grid-template-columns: 1fr 0.85fr; gap: 48px; align-items: start; }
  .bv-contacts__sub { font-size: 16px; color: var(--text-secondary); max-width: 38ch; margin: 18px 0 30px; }
  .bv-links { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 12px; }
  .bv-links a {
    display: flex; align-items: center; gap: 18px; padding: 18px 20px;
    border: 1px solid var(--border-hairline); border-radius: var(--radius-card);
    transition: all var(--dur-base) var(--ease-out);
  }
  .bv-links a:hover { border-color: var(--color-phosphor-mint); box-shadow: var(--glow-mint-soft); transform: translateX(6px); }
  .bv-links__icon { color: var(--color-graphite); transition: color var(--dur-base) var(--ease-out); display: flex; }
  .bv-links a:hover .bv-links__icon { color: var(--color-phosphor-mint); }
  .bv-links__text { display: flex; flex-direction: column; gap: 2px; flex: 1; }
  .bv-links__text b { font-size: 12px; font-weight: 400; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); }
  .bv-links__text em { font-style: normal; font-size: 17px; color: #fff; }
  .bv-links__arrow { color: var(--text-muted); transition: all var(--dur-base) var(--ease-out); display: flex; }
  .bv-links a:hover .bv-links__arrow { color: var(--color-phosphor-mint); transform: translateX(5px); }
  .bv-form { transition: box-shadow .5s, transform .5s; }
  .bv-form:hover { box-shadow: var(--glow-mint-soft); }
  .bv-form form { display: flex; flex-direction: column; gap: 16px; }
  .bv-form__err { margin: 0; color: #ff8585; font-size: 13px; }
  .bv-form__done { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; padding: 40px 0; text-align: center; }
  .bv-form__done--pop { animation: bvpop .55s var(--ease-out); }
  .bv-form__check {
    width: 56px; height: 56px; border-radius: 50%; border: 1px solid var(--color-phosphor-mint);
    display: flex; align-items: center; justify-content: center; color: var(--color-phosphor-mint);
    font-size: 26px; box-shadow: var(--glow-mint-soft);
    animation: bvpulse-ring 2s ease-in-out infinite;
  }
  .bv-form__done p { margin: 0; color: #fff; font-size: 18px; }

  /* ---- FOOTER ---- */
  .bv-footer {
    max-width: var(--page-max-width); margin: clamp(64px,9vw,120px) auto 0; padding: 48px 32px 40px;
    border-top: 1px solid var(--color-slate-mute); position: relative;
  }
  .bv-footer::before {
    content: ''; position: absolute; top: -1px; left: 32px; right: 32px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--color-phosphor-mint), transparent);
    opacity: .5;
  }
  .bv-footer__top { display: grid; grid-template-columns: 1.4fr 1fr auto; gap: 40px; align-items: start; }
  .bv-footer__brand p { color: var(--text-tertiary); font-size: 14px; line-height: 1.5; margin: 16px 0 0; }
  .bv-footer__nav { display: flex; flex-wrap: wrap; gap: 14px 28px; }
  .bv-footer__nav a { color: var(--text-tertiary); font-size: 14px; transition: color var(--dur-fast) var(--ease-out), transform .3s; }
  .bv-footer__nav a:hover { color: #fff; transform: translateY(-2px); }
  .bv-footer__social { display: flex; gap: 12px; }
  .bv-footer__social a {
    width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border-card);
    display: flex; align-items: center; justify-content: center; color: var(--color-slate-mute);
    transition: all var(--dur-base) var(--ease-out);
  }
  .bv-footer__social a:hover { color: var(--color-phosphor-mint); border-color: var(--color-phosphor-mint); transform: translateY(-3px) scale(1.06); }
  .bv-footer__bottom { display: flex; justify-content: space-between; gap: 16px; margin-top: 40px; flex-wrap: wrap;
                       color: var(--text-muted); font-size: 13px; }

  /* reduced motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: .01ms !important; animation-iteration-count: 1 !important; transition-duration: .01ms !important; }
    [data-reveal], [data-reveal-stagger] > * { opacity: 1; transform: none; }
    .bv-cursor-glow { display: none; }
  }

  /* ---- RESPONSIVE ---- */
  @media (max-width: 900px) {
    .bv-nav__links { display: none; }
    .bv-cursor-glow { display: none; }
    .bv-hero { grid-template-columns: 1fr; min-height: auto; text-align: left; }
    .bv-hero__photo-wrap { order: -1; justify-self: start; max-width: 320px; animation: none; }
    .bv-about, .bv-contacts { grid-template-columns: 1fr; }
    .bv-bento { grid-template-columns: 1fr; grid-auto-rows: auto; }
    .bv-work, .bv-work--flagship, .bv-work--wide, .bv-work--tall { grid-column: auto; grid-row: auto; }
    .bv-work__media { min-height: 200px; height: 220px; flex: none; }
    .bv-prices, .bv-reviews { grid-template-columns: 1fr; }
    .bv-footer__top { grid-template-columns: 1fr; }
  }
</style>
</head>
