<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); font-family: var(--font-body); padding: 28px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; align-items: stretch; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { TestimonialCard, PriceCard } = window.DesignSystem_8987fb;
    function Demo() {
      return (
        <div className="grid">
          <TestimonialCard
            quote="Мирон уловил атмосферу нашего гриль-бара с первого созвона. Бронирований стало в 2 раза больше."
            name="Анна Котова" company={'ресторан "Vкус&Огонь"'} rating={5} />
          <PriceCard name="Корпоративный сайт" price="от 120 000 ₽"
            features={["Дизайн + вёрстка", "До 8 страниц", "Базовая SEO-оптимизация"]}
            popular cta="Обсудить проект" />
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
