<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); font-family: var(--font-body); padding: 28px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  h4 { font-family: var(--font-display); font-weight: 300; letter-spacing: 0.04em; color: #fff; margin: 0 0 8px; font-size: 22px; }
  p { color: var(--text-secondary); font-size: 14px; line-height: 1.5; margin: 0; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Card, Stat } = window.DesignSystem_8987fb;
    function Demo() {
      return (
        <div className="grid">
          <Card>
            <h4>Северный Кофе</h4>
            <p>Брендовый сайт с картой точек и программой лояльности.</p>
          </Card>
          <Card featured>
            <h4 style={{color:'#70dcd3'}}>BervinovAcademy</h4>
            <p>Флагман — особое неоновое свечение.</p>
          </Card>
          <Card surface="raised" style={{display:'flex', gap:40}}>
            <Stat value="6+" label="лет в разработке" />
            <Stat value="40" label="проектов" />
          </Card>
          <Card interactive>
            <h4>Hover me</h4>
            <p>Наведи — карточка приподнимается с мятным свечением.</p>
          </Card>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
