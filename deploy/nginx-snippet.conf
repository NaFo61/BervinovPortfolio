# Host nginx — фрагмент для /etc/nginx/sites-available/gateway.conf
# или /etc/nginx/projects-enabled/portfolio.conf
#
# Portfolio слушает 127.0.0.1:18000 (web + /api/ внутри docker).
# Academy — отдельно на 127.0.0.1:18080 (см. bervinov-academy deploy).

upstream bervinov_portfolio {
    server 127.0.0.1:18000;
    keepalive 16;
}

# Подставьте в server { listen 443 ssl; ... } блок portfolio-поддомены:
#
# server_name bervinov-miron.ru www.bervinov-miron.ru
#             severny-kofe.bervinov-miron.ru
#             vkus-ogon.bervinov-miron.ru
#             denta-lux.bervinov-miron.ru
#             fitzone.bervinov-miron.ru
#             lingua-pro.bervinov-miron.ru;

location / {
    proxy_pass http://bervinov_portfolio;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Academy — отдельный server-блок или location /academy/:
#
# location /academy/ {
#     proxy_pass http://127.0.0.1:18080;
#     ...
# }
