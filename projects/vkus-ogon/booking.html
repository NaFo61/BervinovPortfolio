<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Бронь стола — Vкус&Огонь</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="nav">
    <a href="index.html" class="logo"><span class="logo__mark">V</span> Vкус&Огонь</a>
    <nav class="nav__links"><a href="index.html">Главная</a><a href="menu.html">Меню</a><a href="about.html">О нас</a><a href="booking.html" class="is-active">Бронь</a><a href="contacts.html">Контакты</a></nav>
    <a href="booking.html" class="btn btn--fire">Бронь стола</a>
    <button class="nav__burger" aria-label="Меню"><span></span><span></span><span></span></button>
  </header>
  <nav class="nav__mobile"><a href="index.html">Главная</a><a href="menu.html">Меню</a><a href="about.html">О нас</a><a href="booking.html">Бронь</a><a href="contacts.html">Контакты</a></nav>

  <div class="page-hero"><div class="container">
    <div class="breadcrumb"><a href="index.html">Главная</a> / Бронь</div>
    <h1>Забронировать стол</h1><p>Без предоплаты · подтверждение за 15 минут</p>
  </div></div>

  <section><div class="container">
    <div class="form-panel" data-reveal>
      <form class="form" data-form data-lead-site="vkus-ogon" data-lead-form="booking">
        <div class="form-row">
          <div><label>Имя</label><input type="text" name="name" placeholder="Как к вам обращаться" required /></div>
          <div><label>Телефон</label><input type="tel" name="phone" placeholder="+7 (___) ___-__-__" required /></div>
        </div>
        <div class="form-row">
          <div><label>Дата</label><input type="date" name="date" required /></div>
          <div><label>Время</label><select name="time" required><option value="">Выберите</option><option>18:00</option><option>19:00</option><option>20:00</option><option>21:00</option></select></div>
        </div>
        <div><label>Гостей</label><select name="guests" required><option value="">Количество</option><option>2</option><option>3–4</option><option>5–6</option><option>7+</option></select></div>
        <div><label>Пожелания</label><textarea name="notes" rows="3" placeholder="День рождения, место у окна…"></textarea></div>
        <button type="submit" class="btn btn--fire" style="width:100%">Забронировать</button>
      </form>
      <div class="form-success">
        <div class="form-success__icon">🔥</div>
        <h2 style="margin-bottom:8px">Стол забронирован!</h2>
        <p style="color:var(--muted)">Мы перезвоним для подтверждения в течение 15 минут.</p>
      </div>
    </div>
  </div></section>

  <footer class="footer"><div class="container"><div class="footer__bottom" style="border:none;padding:0"><span>© 2026 Vкус&Огонь · Пн–Вс 12:00–23:00+</span></div></div></footer>
  <script src="js/main.js"></script>
</body>
</html>
