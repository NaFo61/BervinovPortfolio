<!-- @dsCard group="Colors" viewport="700x150" name="Surfaces" subtitle="Void canvas → stacked plates, defined by light hairlines" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); font-family: var(--font-body);
         padding: 20px; display: flex; gap: 14px; }
  .sw { flex: 1; height: 110px; border-radius: var(--radius-card); border: 1px solid var(--border-hairline);
        display: flex; flex-direction: column; justify-content: flex-end; padding: 12px; box-sizing: border-box; }
  .name { color: var(--text-primary); font-size: 13px; font-weight: 500; }
  .hex { color: var(--text-muted); font-size: 11px; letter-spacing: 0.4px; margin-top: 2px; }
</style>
</head>
<body>
  <div class="sw" style="background:#070707"><div class="name">Void Canvas</div><div class="hex">#070707 · L0</div></div>
  <div class="sw" style="background:#0d0e12"><div class="name">Carbon Plate</div><div class="hex">#0d0e12 · L1</div></div>
  <div class="sw" style="background:#141418"><div class="name">Obsidian</div><div class="hex">#141418 · L2</div></div>
  <div class="sw" style="background:#2e3038"><div class="name">Iron Edge</div><div class="hex">#2e3038 · L3</div></div>
</body>
</html>
