<!-- @dsCard group="Colors" viewport="700x150" name="Text & Hairlines" subtitle="White → ash → graphite → cinder; the counterintuitive light edge" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); font-family: var(--font-body);
         padding: 22px; display: flex; align-items: center; gap: 28px; }
  .col { display: flex; flex-direction: column; gap: 9px; }
  .row { display: flex; align-items: baseline; gap: 10px; }
  .txt { font-size: 17px; font-weight: 500; }
  .lab { font-size: 11px; color: var(--text-muted); letter-spacing: 0.4px; }
  .edge { width: 150px; height: 92px; background: var(--surface-card); border-radius: var(--radius-card);
          border: 1px solid var(--border-card); display: flex; align-items: center; justify-content: center;
          color: var(--text-tertiary); font-size: 11px; text-align: center; }
</style>
</head>
<body>
  <div class="col">
    <div class="row"><span class="txt" style="color:#ffffff">Pure White</span><span class="lab">#ffffff · primary</span></div>
    <div class="row"><span class="txt" style="color:#c8cad0">Ash</span><span class="lab">#c8cad0 · secondary</span></div>
    <div class="row"><span class="txt" style="color:#aeaeb7">Graphite</span><span class="lab">#aeaeb7 · tertiary</span></div>
    <div class="row"><span class="txt" style="color:#60606c">Cinder</span><span class="lab">#60606c · muted</span></div>
  </div>
  <div class="edge">1px&nbsp;#d9dae5 border<br/>defines the edge<br/>— not shadow</div>
</body>
</html>
