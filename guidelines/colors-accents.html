<!-- @dsCard group="Colors" viewport="700x150" name="Accents" subtitle="Rationed — one accent per viewport; mint is the signature glow" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); font-family: var(--font-body);
         padding: 20px; display: flex; gap: 14px; }
  .sw { flex: 1; height: 110px; border-radius: var(--radius-card); border: 1px solid var(--border-hairline);
        display: flex; flex-direction: column; justify-content: flex-end; padding: 12px; box-sizing: border-box; }
  .dot { width: 22px; height: 22px; border-radius: 50%; margin-bottom: auto; }
  .name { font-size: 12px; font-weight: 500; }
  .hex { font-size: 11px; letter-spacing: 0.4px; margin-top: 2px; opacity: 0.7; }
</style>
</head>
<body>
  <div class="sw" style="background:#0d0e12; box-shadow: var(--glow-mint-soft)">
    <div class="dot" style="background:#70dcd3; box-shadow:0 0 16px #70dcd3"></div>
    <div class="name" style="color:#70dcd3">Phosphor Mint</div><div class="hex" style="color:#70dcd3">#70dcd3</div></div>
  <div class="sw" style="background:#0d0e12">
    <div class="dot" style="background:#0092e4"></div>
    <div class="name" style="color:#0092e4">Signal Blue</div><div class="hex" style="color:#0092e4">#0092e4</div></div>
  <div class="sw" style="background:#0d0e12">
    <div class="dot" style="background:#75ae4c"></div>
    <div class="name" style="color:#75ae4c">Verdant Edge</div><div class="hex" style="color:#75ae4c">#75ae4c</div></div>
  <div class="sw" style="background:#0d0e12">
    <div class="dot" style="background:#a6e5f2"></div>
    <div class="name" style="color:#a6e5f2">Ice Blue</div><div class="hex" style="color:#a6e5f2">#a6e5f2</div></div>
</body>
</html>
