<!-- @dsCard group="Brand" viewport="700x180" name="Logo — МБ" subtitle="Monogram mark, mint hairline ring; phosphor glow reserved for featured" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); font-family: var(--font-body);
         padding: 24px; display: flex; align-items: center; gap: 32px; }
  .mark { width: 88px; height: 88px; border-radius: 22px; border: 1px solid var(--color-phosphor-mint);
          display: flex; align-items: center; justify-content: center; box-shadow: var(--glow-mint-soft);
          font-family: var(--font-display); font-weight: 600; font-size: 34px; letter-spacing: 0.056em;
          color: var(--color-phosphor-mint); background: var(--surface-card); }
  .lock { display: flex; align-items: center; gap: 12px; }
  .lock .mb { font-family: var(--font-display); font-weight: 600; font-size: 22px; letter-spacing: 0.08em;
              color: #fff; border: 1px solid var(--border-card); border-radius: 10px; padding: 6px 11px; }
  .lock .name { font-family: var(--font-display); font-weight: 300; font-size: 24px; letter-spacing: 0.056em; color: #fff; }
  .sub { color: var(--text-muted); font-size: 12px; letter-spacing: 0.4px; margin-top: 4px; }
</style>
</head>
<body>
  <div class="mark">МБ</div>
  <div>
    <div class="lock"><span class="mb">МБ</span><span class="name">Бервинов Мирон</span></div>
    <div class="sub">Разработка сайтов под ключ</div>
  </div>
</body>
</html>
