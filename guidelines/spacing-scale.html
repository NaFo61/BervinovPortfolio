<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing Scale" subtitle="8px base, comfortable density — 8 · 16 · 24 · 32 · 40 · 56 · 80" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); font-family: var(--font-body);
         padding: 24px; display: flex; align-items: flex-end; gap: 16px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: var(--color-phosphor-mint); border-radius: 3px; width: 100%; }
  .v { color: var(--text-tertiary); font-size: 11px; letter-spacing: 0.4px; }
  .item { width: 56px; }
</style>
</head>
<body>
  <div class="item"><div class="bar" style="height:8px"></div><div class="v">8</div></div>
  <div class="item"><div class="bar" style="height:16px"></div><div class="v">16</div></div>
  <div class="item"><div class="bar" style="height:24px"></div><div class="v">24</div></div>
  <div class="item"><div class="bar" style="height:32px"></div><div class="v">32</div></div>
  <div class="item"><div class="bar" style="height:40px"></div><div class="v">40</div></div>
  <div class="item"><div class="bar" style="height:56px"></div><div class="v">56</div></div>
  <div class="item"><div class="bar" style="height:80px"></div><div class="v">80</div></div>
</body>
</html>
